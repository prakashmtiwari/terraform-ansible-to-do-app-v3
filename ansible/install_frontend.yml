---
- hosts: frontend
  become: yes

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install prerequisites
      apt:
        name:
          - curl
        state: present
        update_cache: yes

    - name: Add NodeSource repository
      shell: curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
      args:
        executable: /bin/bash

    - name: Install Node.js
      apt:
        name: nodejs
        state: present


    - name: Clone repository
      git:
        repo: 'https://github.com/prakashmtiwari/terraform-ansible-to-do-app.git'
        dest: /home/ubuntu/to-do-app
        version: main

    - name: Install frontend dependencies
      command: npm install
      args:
        chdir: /home/ubuntu/to-do-app/frontend

    - name: Create .env
      template:
        src: /home/prakash-tiwari/projects/tutedue/devops/assignments/to-do-app-v2/ansible/templates/frontend.env.j2
        dest: /home/ubuntu/to-do-app/frontend/.env